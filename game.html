<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Promises</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0a08; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Press Start 2P', monospace; padding: 10px; }
        #game { width: 700px; max-width: 100%; height: 500px; max-height: 90vh; background: #1a1410; border: 4px solid #3a2c24; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        #bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.3; }
        #ui { position: relative; z-index: 2; flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 16px; }
        #speaker { font-size: 11px; color: #b8a090; border-bottom: 2px solid #3a2c24; padding-bottom: 4px; margin-bottom: 6px; display: none; }
        #speaker.show { display: block; }
        #text { flex: 1; overflow-y: auto; color: #d4c4b0; font-size: 12px; line-height: 1.6; cursor: pointer; min-height: 3em; }
        #choices { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .btn { background: #1e1612; border: 2px solid #4a3a32; color: #d4c4b0; padding: 6px 12px; font-family: 'Press Start 2P', monospace; font-size: 10px; cursor: pointer; flex: 1 1 45%; text-align: center; }
        .btn:hover { background: #3a2c24; }
        #progress { height: 4px; background: #1a1410; position: relative; margin-top: 6px; }
        #fill { height: 100%; width: 0%; background: #7a4a3a; transition: width 0.3s; }
        #version { position: absolute; bottom: 2px; right: 8px; font-size: 7px; color: #3a2a22; z-index: 3; }
        #back { position: absolute; top: 8px; left: 8px; z-index: 3; background: rgba(0,0,0,0.5); border: 1px solid #4a3a32; color: #b8a090; padding: 4px 10px; font-size: 8px; cursor: pointer; font-family: 'Press Start 2P', monospace; }
        @media (max-width: 600px) { #game { height: 90vh; } #text { font-size: 10px; } .btn { font-size: 8px; } }
    </style>
</head>
<body>
<div id="game">
    <div id="bg"></div>
    <div id="ui">
        <div id="speaker"></div>
        <div id="text"></div>
        <div id="choices"></div>
        <div id="progress"><div id="fill"></div></div>
    </div>
    <div id="version">v0.3.5</div>
    <button id="back" onclick="window.location.href='index.html'">← Menu</button>
</div>
<script>
// =================== ВСЕ ДАННЫЕ В BASE64 ===================
const b64 = {
    ui: 'eyJiYWNrIjoi4oaQINCc0LXQvdGOKiIsInJlc3RhcnQiOiLQodC90LDRh9Cw0LvQviIsIm1lbnUiOiLQkiDQvNC10L3RjiIsImVuZFRpdGxlIjoi0JrQntCd0JXQpiJ9',
    // Полный сценарий (все сцены) - BASE64
    story: 'eyJzdGFydFNjZW5lIjoiYmlydGgiLCJzY2VuZXMiOlt7ImlkIjoiYmlydGgiLCJzcGVha2VyIjoi0J/QvtCy0LXRgdGC0LLQvtCy0LDRgtC10LvRjCIsInRleHQiOiLQlNC10LrQsNCx0YDRjCAyMDAwLiDQl9Cw0LLQtdGC0YfQtdC90YHQutCwLiDQotGLINGA0L7QtNC40LvRgdGPINCyINGE0YDRg9GJ0ZHQstC60LUuINCe0YLQtdGGIC0g0LPRgNGD0LfRh9C40LosINC80LDRgtGMIC0g0YPQsdC+0YDQvtGJ0LjQutCwLiDQlNC10L3QtdCzINCyINC+0LHRgNC10LcuINCk0LXQsdGPINC90LDQt9C+0LLQsNC70Lgg0JzQsNGA0LrQvtC8LiDQotCy0L7RjyDQttC40LfQvdGMIC0g0LjRgdGC0L7RgNC40Y8g0YHQu9C+0LzQsNC90L3Ri9GFINC+0LHQtdGJ0LDQvdC40LkuiwiaW1hZ2UiOiJpbWFnZXMvYmlydGgucG5nIiwiYmFja2dyb3VuZCI6ImltYWdlcy93aW50ZXJfYmcucG5nIiwiY2hvaWNlcyI6W3sidGV4dCI6ItCf0L7RgdC80L7RgtGA0LXRgtGMINC90LAg0LzQuNGAIOKGkiIsIm5leHRJZCI6ImNoaWxkaG9vZF8xIn1dfSx7ImlkIjoiY2hpbGRob29kXzEiLCJzcGVha2VyIjoi0J/QvtCy0LXRgdGC0LLQvtCy0LDRgtC10LvRjCIsInRleHQiOiLQpNC10LHRjCAzINCz0L7QtNCwLiDQnNCw0LzQsCDQv9C10YDQtdGB0YfQuNGC0YvQstCw0LXRgiDQvNC10LvQvtGF0YwuINCe0YLQtdGGINC/0L7QtNC90LjQvNCw0LXRgtGB0Y8g0L/QviDQu9C10YHRgtC90LjRhtC1IC0g0YjQsNCz0Lgg0YLRj9C20ZbQvtC70YzQuSwg0L3QtdC00L7QsdGA0YvQtS4iLCJpbWFnZSI6ImltYWdlcy9yb29tLnBuZyIsImJhY2tncm91bmQiOiJpbWFnZXMvYXB0X2JnLnBuZyIsImNob2ljZXMiOlt7InRleHQiOiLQktGL0LnRgtC4INC6INC+0YLQtdCz0YMifSx7InRleHQiOiLQodC/0YDRj9GC0LDRgtGM0YHRjyDQv9C+0LQg0YHRgtC+0LwifV19XX0='
};

function d(s) { return atob(s); }

const ui = JSON.parse(d(b64.ui));
const story = JSON.parse(d(b64.story));

document.getElementById('back').textContent = ui.back;

let currentScene = story.startScene;
let visited = new Set();
let typing = false;
let timer = null;
let fullText = '';
let stats = {};

function render(sceneId) {
    const scene = story.scenes.find(s => s.id === sceneId);
    if (!scene) { document.getElementById('text').textContent = 'Сцена не найдена.'; return; }
    visited.add(sceneId);
    localStorage.setItem('save', JSON.stringify({ scene: sceneId, visited: [...visited], stats }));

    if (scene.background) document.getElementById('bg').style.backgroundImage = `url('${scene.background}')`;

    const speaker = document.getElementById('speaker');
    if (scene.speaker) { speaker.textContent = scene.speaker; speaker.className = 'show'; }
    else { speaker.className = ''; }

    const textEl = document.getElementById('text');
    textEl.innerHTML = '';
    fullText = scene.text || '';
    typing = true;
    typeWriter(textEl, fullText, 0);

    const choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    if (scene.choices && scene.choices.length) {
        scene.choices.forEach(ch => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.textContent = ch.text;
            btn.onclick = () => { if (ch.nextId) render(ch.nextId); else showEnd(); };
            choicesEl.appendChild(btn);
        });
    } else {
        showEnd();
    }

    const total = story.scenes.length;
    const progress = Math.min(100, Math.round((visited.size / total) * 100));
    document.getElementById('fill').style.width = progress + '%';

    textEl.onclick = function() {
        if (typing) {
            clearTimeout(timer);
            textEl.innerHTML = fullText;
            typing = false;
        }
    };
}

function typeWriter(el, text, i) {
    if (i < text.length) {
        el.innerHTML += text.charAt(i);
        timer = setTimeout(() => typeWriter(el, text, i+1), 20);
    } else {
        typing = false;
    }
}

function showEnd() {
    document.getElementById('text').textContent = '🏁 Конец. Спасибо за игру!';
    const choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.textContent = ui.restart;
    btn.onclick = resetGame;
    choicesEl.appendChild(btn);
    localStorage.removeItem('save');
}

function resetGame() {
    visited = new Set();
    stats = {};
    currentScene = story.startScene;
    render(currentScene);
}

const saved = localStorage.getItem('save');
if (saved) {
    const data = JSON.parse(saved);
    currentScene = data.scene || story.startScene;
    visited = new Set(data.visited || []);
    stats = data.stats || {};
}
render(currentScene);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Broken Promises</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* Стили такие же, как в предыдущей версии, я их не меняю */
        * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }
        body { background: #0d0a08; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Press Start 2P', monospace; padding: 10px; }
        #game-container { width: 800px; max-width: 100%; height: 600px; max-height: 90vh; position: relative; border: 6px solid #3a2c24; box-shadow: 0 0 0 4px #5a4a3a, 0 0 0 8px #2a1e18, inset 0 0 30px rgba(0,0,0,0.8); background: #0f0a08; overflow: hidden; animation: pixelFade 0.6s steps(2); }
        @keyframes pixelFade { 0% { opacity: 0; transform: scale(0.96); } 100% { opacity: 1; transform: scale(1); } }
        #bg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 3px, transparent 3px, transparent 6px); z-index: 0; pointer-events: none; }
        #background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.35; image-rendering: pixelated; transition: background-image 1s steps(3); z-index: 1; filter: brightness(0.8) saturate(0.6); }
        #text-box { position: absolute; bottom: 20px; left: 20px; right: 20px; background: rgba(14, 10, 8, 0.92); border: 4px solid #4a3a32; padding: 14px 18px; color: #d4c4b0; font-size: 12px; line-height: 1.8; max-height: 65%; display: flex; flex-direction: column; gap: 6px; box-shadow: inset 0 0 0 2px #2a1e18, 0 0 40px rgba(0,0,0,0.9); z-index: 2; border-radius: 0; }
        #speaker-name { font-size: 10px; color: #b8a090; border-bottom: 3px solid #3a2c24; padding-bottom: 4px; margin-bottom: 4px; display: none; letter-spacing: 1px; text-transform: uppercase; }
        #speaker-name.visible { display: block; }
        #scene-image { text-align: center; margin-bottom: 4px; }
        #scene-img { max-width: 100%; max-height: 110px; border: 3px solid #3a2c24; image-rendering: pixelated; background: #0f0a08; transition: opacity 0.4s steps(2); }
        #scene-text { flex: 1; overflow-y: auto; padding-right: 6px; font-size: 11px; letter-spacing: 0.5px; cursor: pointer; min-height: 2.5em; color: #d4c8bc; }
        #scene-text::-webkit-scrollbar { width: 6px; background: #1e1612; }
        #scene-text::-webkit-scrollbar-thumb { background: #4a3a32; border: 1px solid #2a1e18; }
        #choices { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 4px; }
        .choice-btn { background: #1e1612; border: 3px solid #4a3a32; color: #d4c4b0; padding: 8px 16px; font-family: 'Press Start 2P', monospace; font-size: 10px; cursor: pointer; transition: all 0.1s steps(2); flex: 1 1 40%; min-width: 100px; text-align: center; image-rendering: pixelated; box-shadow: inset 0 0 0 2px #0f0a08; touch-action: manipulation; }
        .choice-btn:hover { background: #3a2c24; color: #f0e6d0; border-color: #b8a090; }
        .choice-btn:active { transform: scale(0.95); }
        #progress-bar { position: absolute; bottom: 6px; left: 20px; right: 20px; height: 6px; background: #1a1410; border: 2px solid #3a2c24; box-shadow: inset 0 0 0 2px #0a0705; z-index: 3; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: #7a4a3a; transition: width 0.3s steps(3); }
        #progress-text { position: absolute; right: 6px; top: -18px; font-size: 8px; color: #5a4a3a; font-family: 'Press Start 2P', monospace; }
        #version { position: absolute; bottom: 2px; right: 8px; font-size: 8px; color: #3a2a22; font-family: 'Press Start 2P', monospace; letter-spacing: 1px; opacity: 0.5; z-index: 4; }
        #back-btn { position: absolute; top: 8px; left: 8px; z-index: 5; background: rgba(20,16,14,0.7); border: 2px solid #4a3a32; color: #b8a090; padding: 6px 12px; font-family: 'Press Start 2P', monospace; font-size: 8px; cursor: pointer; transition: all 0.1s steps(2); image-rendering: pixelated; touch-action: manipulation; }
        #back-btn:hover { background: #3a2c24; color: #f0e6d0; }
        #back-btn:active { transform: scale(0.95); }
        #ending-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 10; justify-content: center; align-items: center; padding: 20px; animation: pixelFade 0.3s steps(2); }
        #ending-modal { background: #1e1612; border: 6px solid #4a3a32; box-shadow: inset 0 0 0 3px #0f0a08, 0 0 40px rgba(0,0,0,0.9); padding: 24px 20px 20px; max-width: 90%; max-height: 80%; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; image-rendering: pixelated; }
        #ending-title { font-size: 18px; color: #f0d8c8; text-align: center; border-bottom: 3px solid #3a2c24; padding-bottom: 8px; letter-spacing: 2px; }
        #ending-text { font-size: 12px; line-height: 1.6; color: #d4c4b0; padding: 4px 0; }
        #ending-stats { font-size: 10px; line-height: 1.8; color: #b8a090; background: #0f0a08; border: 2px solid #2a1e18; padding: 10px 12px; margin: 4px 0; white-space: pre-line; }
        #ending-buttons { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 8px; }
        .ending-btn { background: #1e1612; border: 3px solid #4a3a32; color: #d4c4b0; padding: 10px 20px; font-family: 'Press Start 2P', monospace; font-size: 10px; cursor: pointer; transition: all 0.1s steps(2); flex: 1 1 40%; min-width: 120px; text-align: center; box-shadow: inset 0 0 0 2px #0f0a08; touch-action: manipulation; }
        .ending-btn:hover { background: #3a2c24; color: #f0e6d0; border-color: #b8a090; }
        .ending-btn:active { transform: scale(0.95); }
        .ending-btn.primary { background: #2a1e18; border-color: #b06040; color: #f0d8c8; }
        .ending-btn.primary:hover { background: #4a3228; border-color: #c07050; }
        @media (max-width: 700px) {
            #game-container { height: 90vh; border-width: 4px; box-shadow: 0 0 0 2px #5a4a3a, 0 0 0 4px #2a1e18; }
            #text-box { bottom: 12px; left: 12px; right: 12px; padding: 12px; font-size: 10px; max-height: 70%; }
            .choice-btn { font-size: 8px; padding: 6px 10px; min-width: 70px; flex: 1 1 100%; }
            #scene-text { font-size: 9px; }
            #speaker-name { font-size: 8px; }
            #scene-img { max-height: 80px; }
            #version { font-size: 6px; bottom: 1px; right: 4px; }
            #progress-text { font-size: 6px; top: -16px; }
            #back-btn { font-size: 6px; padding: 4px 8px; top: 4px; left: 4px; }
            #ending-modal { padding: 16px; }
            #ending-title { font-size: 14px; }
            #ending-text { font-size: 10px; }
            #ending-stats { font-size: 8px; padding: 8px; }
            .ending-btn { font-size: 8px; padding: 8px 12px; min-width: 80px; }
        }
    </style>
</head>

</div>

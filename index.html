<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Promises</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0a08; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Press Start 2P', monospace; padding: 10px; }
        #menu { width: 700px; max-width: 100%; height: 500px; max-height: 90vh; background: #1a1410; border: 4px solid #3a2c24; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; padding: 20px; }
        #title { font-size: 28px; color: #d4c4b0; letter-spacing: 4px; margin-bottom: 8px; }
        #sub { font-size: 12px; color: #7a6a5a; margin-bottom: 30px; }
        #btns { display: flex; flex-direction: column; gap: 12px; width: 70%; max-width: 250px; }
        .btn { background: #1e1612; border: 2px solid #4a3a32; color: #d4c4b0; padding: 12px; font-family: 'Press Start 2P', monospace; font-size: 12px; cursor: pointer; text-align: center; }
        .btn:hover { background: #3a2c24; }
        .btn.play { border-color: #b06040; }
        #version { position: absolute; bottom: 8px; right: 12px; font-size: 8px; color: #3a2a22; }
        #warning { display: flex; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; flex-direction: column; padding: 20px; }
        #warning.hidden { display: none; }
        #wtitle { font-size: 16px; color: #f0d8c8; margin-bottom: 12px; }
        #wtext { font-size: 10px; color: #d4c4b0; text-align: center; line-height: 1.8; max-width: 400px; margin-bottom: 16px; }
        #wbtn { background: #2a1e18; border: 2px solid #b06040; color: #f0d8c8; padding: 10px 20px; font-family: 'Press Start 2P', monospace; font-size: 12px; cursor: pointer; }
        @media (max-width: 600px) { #title { font-size: 22px; } .btn { font-size: 10px; } }
    </style>
</head>
<body>
<div id="menu">
    <div id="title">BROKEN PROMISES</div>
    <div id="sub"></div>
    <div id="btns">
        <button class="btn play" id="playBtn"></button>
        <button class="btn" id="settingsBtn"></button>
        <button class="btn" id="supportBtn"></button>
    </div>
    <div id="version">v0.3.5</div>
    <div id="warning">
        <div id="wtitle"></div>
        <div id="wtext"></div>
        <button id="wbtn"></button>
    </div>
</div>
<script>
// Base64 тексты

    play: '4pa6INCY0LPRgNCw0YLRjA==',
    settings: '4pmZINCd0LDRgdGC0YDQvtC50LrQuA==',
    support: '4pyJINCf0L7QtNC00LXRgNC20LDRgtGMPw==',

    wbtn: '0K8g0L/QvtC90Y/Riywg0L/RgNC+0LTQvtC70LbQuNGC0Yw='

function d(s) { return atob(s); }

document.getElementById('sub').textContent = d(b64.sub);
document.getElementById('playBtn').textContent = d(b64.play);
document.getElementById('settingsBtn').textContent = d(b64.settings);
document.getElementById('supportBtn').textContent = d(b64.support);
document.getElementById('wtitle').textContent = d(b64.wtitle);

document.getElementById('wbtn').textContent = d(b64.wbtn);

</body>
</html>

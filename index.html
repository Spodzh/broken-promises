<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Broken Promises</title>
<style>
/* стили */
*{margin:0;padding:0;box-sizing:border-box;image-rendering:pixelated}
body{background:#0d0a08;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Press Start 2P',monospace;padding:10px}
#menu-container{width:800px;max-width:100%;height:600px;max-height:90vh;position:relative;border:6px solid #3a2c24;box-shadow:0 0 0 4px #5a4a3a,0 0 0 8px #2a1e18,inset 0 0 30px rgba(0,0,0,0.8);background:#0f0a08;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;animation:pixelFade .6s steps(2)}
@keyframes pixelFade{0%{opacity:0;transform:scale(.96)}100%{opacity:1;transform:scale(1)}}
#bg-layer{position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,rgba(0,0,0,.03)0px,rgba(0,0,0,.03)3px,transparent 3px,transparent 6px);z-index:0;pointer-events:none}
#title{position:relative;z-index:1;font-size:32px;color:#d4c4b0;text-shadow:0 0 20px rgba(180,80,60,.4);letter-spacing:4px;text-align:center;margin-bottom:10px}
#subtitle{position:relative;z-index:1;font-size:12px;color:#7a6a5a;letter-spacing:2px;margin-bottom:40px;text-align:center}
#menu-buttons{position:relative;z-index:1;display:flex;flex-direction:column;gap:16px;width:70%;max-width:300px}
.menu-btn{background:#1e1612;border:3px solid #4a3a32;color:#d4c4b0;padding:14px 20px;font-family:'Press Start 2P',monospace;font-size:14px;cursor:pointer;transition:all .1s steps(2);text-align:center;box-shadow:inset 0 0 0 2px #0f0a08;touch-action:manipulation;text-transform:uppercase}
.menu-btn:hover{background:#3a2c24;color:#f0e6d0;border-color:#b8a090}
.menu-btn:active{transform:scale(.95)}
.menu-btn.play{background:#2a1e18;border-color:#b06040;color:#f0d8c8}
.menu-btn.play:hover{background:#4a3228;border-color:#c07050}
#version{position:absolute;bottom:8px;right:12px;font-size:8px;color:#3a2a22;font-family:'Press Start 2P',monospace;letter-spacing:1px;opacity:.5;z-index:2}
#footer{position:absolute;bottom:8px;left:12px;font-size:8px;color:#3a2a22;opacity:.3;z-index:2;font-family:'Press Start 2P',monospace}
#warning-overlay{display:flex;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:10;justify-content:center;align-items:center;padding:20px;animation:pixelFade .4s steps(2)}
#warning-modal{background:#1e1612;border:6px solid #4a3a32;box-shadow:inset 0 0 0 3px #0f0a08,0 0 40px rgba(0,0,0,.9);padding:24px 20px 20px;max-width:90%;max-height:80%;overflow-y:auto;display:flex;flex-direction:column;gap:14px;image-rendering:pixelated;text-align:center}
#warning-title{font-size:16px;color:#f0d8c8;letter-spacing:2px;border-bottom:3px solid #3a2c24;padding-bottom:8px}
#warning-text{font-size:11px;line-height:1.8;color:#d4c4b0;padding:4px 0;white-space:pre-line}
#warning-text a{color:#c07050;text-decoration:none;border-bottom:2px solid #3a2c24}
#warning-text a:hover{color:#f0d8c8;border-color:#b8a090}
#warning-btn{background:#2a1e18;border:3px solid #b06040;color:#f0d8c8;padding:12px 20px;font-family:'Press Start 2P',monospace;font-size:12px;cursor:pointer;transition:all .1s steps(2);box-shadow:inset 0 0 0 2px #0f0a08;touch-action:manipulation;margin-top:8px}
#warning-btn:hover{background:#4a3228;border-color:#c07050}
#warning-btn:active{transform:scale(.95)}
@media (max-width:700px){#menu-container{height:90vh;border-width:4px;box-shadow:0 0 0 2px #5a4a3a,0 0 0 4px #2a1e18}#title{font-size:22px;letter-spacing:2px}#subtitle{font-size:10px;margin-bottom:30px}.menu-btn{font-size:12px;padding:12px 16px}#menu-buttons{width:80%}#warning-title{font-size:14px}#warning-text{font-size:10px}#warning-btn{font-size:10px;padding:10px 16px}}
@media (max-width:400px){#title{font-size:18px}.menu-btn{font-size:10px;padding:10px 12px}}
</style>
</head>
<body>
<div id="menu-container">
<div id="bg-layer"></div>
<div id="title">BROKEN PROMISES</div>
<div id="subtitle"></div>
<div id="menu-buttons">
<button class="menu-btn play" id="play-btn"></button>
<button class="menu-btn" id="settings-btn"></button>
<button class="menu-btn" id="support-btn"></button>

<div id="version">v0.3.3</div>

</div>

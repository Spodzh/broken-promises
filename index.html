<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Broken Promises</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/menu.css">
</head>
<body>
<div id="menu-container">
    <div id="bg-layer"></div>
    <div id="title">BROKEN PROMISES</div>
    <div id="subtitle"></div> <!-- сюда вставим текст через JS -->
    <div id="menu-buttons">
        <button class="menu-btn play" id="play-btn"></button>
        <button class="menu-btn" id="settings-btn"></button>
        <button class="menu-btn" id="support-btn"></button>
    </div>
    <div id="version">v0.3.1</div>
    <div id="footer">32-bit pixel</div>

    <!-- Предупреждение -->
    <div id="warning-overlay">
        <div id="warning-modal">
            <div id="warning-title"></div>
            <div id="warning-text"></div>
            <button id="warning-btn"></button>
        </div>
    </div>
</div>
<script>
    // Все русские тексты через JS
    var MENU_TEXTS = {
        subtitle: '\u0418\u0441\u0442\u043e\u0440\u0438\u044f \u043e\u0434\u043d\u043e\u0439 \u0436\u0438\u0437\u043d\u0438',
        play: '\u25b6 \u0418\u0433\u0440\u0430\u0442\u044c',
        settings: '\u2699 \u041d\u0430\u0441\u0442\u0440\u043e\u0439\u043a\u0438',
        support: '\u2709 \u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0430\u0442\u044c',
        warningTitle: '\u26a0 \u0412\u041d\u0418\u041c\u0410\u041d\u0418\u0415',
        warningText: '\u0418\u0433\u0440\u0430 \u043d\u0430\u0445\u043e\u0434\u0438\u0442\u0441\u044f \u043d\u0430 \u0440\u0430\u043d\u043d\u0435\u0439 \u0441\u0442\u0430\u0434\u0438\u0438 \u0440\u0430\u0437\u0440\u0430\u0431\u043e\u0442\u043a\u0438.\n\u0412\u043e\u0437\u043c\u043e\u0436\u043d\u044b \u0431\u0430\u0433\u0438, \u0438\u0437\u043c\u0435\u043d\u0435\u043d\u0438\u044f \u0441\u044e\u0436\u0435\u0442\u0430 \u0438 \u0434\u0438\u0437\u0430\u0439\u043d\u0430.\n\n\u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0430\u0442\u044c \u0438 \u0441\u043b\u0435\u0434\u0438\u0442\u044c \u0437\u0430 \u043d\u043e\u0432\u043e\u0441\u0442\u044f\u043c\u0438 \u043c\u043e\u0436\u043d\u043e \u0432 \u0442\u0435\u043b\u0435\u0433\u0440\u0430\u043c-\u043a\u0430\u043d\u0430\u043b\u0435:\nt.me/brokenpromisesgame',
        warningBtn: '\u042f \u043f\u043e\u043d\u044f\u043b, \u043f\u0440\u043e\u0434\u043e\u043b\u0436\u0438\u0442\u044c'
    };

    // Вставляем тексты в элементы
    document.getElementById('subtitle').textContent = MENU_TEXTS.subtitle;
    document.getElementById('play-btn').textContent = MENU_TEXTS.play;
    document.getElementById('settings-btn').textContent = MENU_TEXTS.settings;
    document.getElementById('support-btn').textContent = MENU_TEXTS.support;
    document.getElementById('warning-title').textContent = MENU_TEXTS.warningTitle;
    document.getElementById('warning-text').textContent = MENU_TEXTS.warningText;
    document.getElementById('warning-btn').textContent = MENU_TEXTS.warningBtn;

    // Обработчики кнопок
    document.getElementById('play-btn').addEventListener('click', function() {
        window.location.href = 'game.html';
    });
    document.getElementById('settings-btn').addEventListener('click', function() {
        alert('\u041d\u0430\u0441\u0442\u0440\u043e\u0439\u043a\u0438 \u0431\u0443\u0434\u0443\u0442 \u043f\u043e\u0437\u0436\u0435');
    });
    document.getElementById('support-btn').addEventListener('click', function() {
        window.open('https://t.me/brokenpromisesgame', '_blank');
    });

    function closeWarning() {
        document.getElementById('warning-overlay').style.display = 'none';
    }
    document.getElementById('warning-btn').addEventListener('click', closeWarning);
</script>
</body>
</html>

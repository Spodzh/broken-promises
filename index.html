<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Promises</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0a08; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Press Start 2P', monospace; }
        #menu { width: 700px; max-width: 100%; height: 500px; max-height: 90vh; background: #1a1410; border: 4px solid #3a2c24; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        #title { font-size: 32px; color: #d4c4b0; text-shadow: 0 0 20px rgba(180,80,60,0.4); margin-bottom: 10px; }
        #subtitle { font-size: 12px; color: #7a6a5a; margin-bottom: 30px; }
        .btn { background: #1e1612; border: 2px solid #4a3a32; color: #d4c4b0; padding: 12px 24px; font-family: 'Press Start 2P', monospace; font-size: 14px; cursor: pointer; margin: 6px; width: 60%; text-align: center; }
        .btn:hover { background: #3a2c24; }
        .btn.play { border-color: #b06040; }
        #version { position: absolute; bottom: 8px; right: 12px; font-size: 8px; color: #3a2a22; }
        #warning { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; flex-direction: column; padding: 20px; text-align: center; }
        #warning div { background: #1e1612; border: 4px solid #4a3a32; padding: 20px; max-width: 80%; }
        #warning h2 { color: #f0d8c8; font-size: 16px; margin-bottom: 10px; }
        #warning p { color: #d4c4b0; font-size: 11px; line-height: 1.6; white-space: pre-line; }
        #warning a { color: #c07050; }
        #warning button { background: #2a1e18; border: 2px solid #b06040; color: #f0d8c8; padding: 10px 20px; font-family: 'Press Start 2P', monospace; font-size: 12px; cursor: pointer; margin-top: 10px; }
        @media (max-width: 600px) { #title { font-size: 22px; } .btn { font-size: 12px; padding: 10px; } }
    </style>
</head>
<body>
<div id="menu">
    <div id="title">BROKEN PROMISES</div>
    <div id="subtitle"></div>
    <button class="btn play" id="playBtn"></button>
    <button class="btn" id="settingsBtn"></button>
    <button class="btn" id="supportBtn"></button>
    <div id="version">v0.3.4</div>
    <div id="warning">
        <div>
            <h2 id="warnTitle"></h2>
            <p id="warnText"></p>
            <button id="warnBtn"></button>
        </div>
    </div>
</div>

</body>
</html>

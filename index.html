<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Broken Promises</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
        }
        body {
            background: #0d0a08;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            padding: 10px;
        }
        #menu-container {
            width: 800px;
            max-width: 100%;
            height: 600px;
            max-height: 90vh;
            position: relative;
            border: 6px solid #3a2c24;
            box-shadow: 0 0 0 4px #5a4a3a, 0 0 0 8px #2a1e18, inset 0 0 30px rgba(0,0,0,0.8);
            background: #0f0a08;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: pixelFade 0.6s steps(2);
        }
        @keyframes pixelFade {
            0% { opacity: 0; transform: scale(0.96); }
            100% { opacity: 1; transform: scale(1); }
        }
        #bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 3px, transparent 3px, transparent 6px);
            z-index: 0;
            pointer-events: none;
        }
        #title {
            position: relative;
            z-index: 1;
            font-size: 32px;
            color: #d4c4b0;
            text-shadow: 0 0 20px rgba(180,80,60,0.4);
            letter-spacing: 4px;
            text-align: center;
            margin-bottom: 10px;
        }
        #subtitle {
            position: relative;
            z-index: 1;
            font-size: 12px;
            color: #7a6a5a;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-align: center;
        }
        #menu-buttons {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 70%;
            max-width: 300px;
        }
        .menu-btn {
            background: #1e1612;
            border: 3px solid #4a3a32;
            color: #d4c4b0;
            padding: 14px 20px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.1s steps(2);
            text-align: center;
            box-shadow: inset 0 0 0 2px #0f0a08;
            touch-action: manipulation;
            text-transform: uppercase;
        }
        .menu-btn:hover {
            background: #3a2c24;
            color: #f0e6d0;
            border-color: #b8a090;
        }
        .menu-btn:active {
            transform: scale(0.95);
        }
        .menu-btn.play {
            background: #2a1e18;
            border-color: #b06040;
            color: #f0d8c8;
        }
        .menu-btn.play:hover {
            background: #4a3228;
            border-color: #c07050;
        }
        #version {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 8px;
            color: #3a2a22;
            font-family: 'Press Start 2P', monospace;
            letter-spacing: 1px;
            opacity: 0.5;
            z-index: 2;
        }
        #footer {
            position: absolute;
            bottom: 8px;
            left: 12px;
            font-size: 8px;
            color: #3a2a22;
            opacity: 0.3;
            z-index: 2;
            font-family: 'Press Start 2P', monospace;
        }
        /* Адаптивность */
        @media (max-width: 700px) {
            #menu-container {
                height: 90vh;
                border-width: 4px;
                box-shadow: 0 0 0 2px #5a4a3a, 0 0 0 4px #2a1e18;
            }
            #title {
                font-size: 22px;
                letter-spacing: 2px;
            }
            #subtitle {
                font-size: 10px;
                margin-bottom: 30px;
            }
            .menu-btn {
                font-size: 12px;
                padding: 12px 16px;
            }
            #menu-buttons {
                width: 80%;
            }
        }
        @media (max-width: 400px) {
            #title {
                font-size: 18px;
            }
            .menu-btn {
                font-size: 10px;
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <div id="menu-container">
        <div id="bg-layer"></div>
        <div id="title">BROKEN PROMISES</div>
        <div id="subtitle">История одной жизни</div>
        <div id="menu-buttons">
            <button class="menu-btn play" onclick="startGame()">▶ Играть</button>
            <button class="menu-btn" onclick="alert('Настройки будут позже')">⚙ Настройки</button>
            <button class="menu-btn" onclick="alert('Выход (закройте вкладку)')">✕ Выход</button>
        </div>
        <div id="version">v0.2.0</div>
        <div id="footer">32-bit pixel</div>
    </div>
    <script>
        function startGame() {
            // Переход к игре (game.html)
            window.location.href = 'game.html';
        }
    </script>
</body>
</html>
